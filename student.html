<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生端 - 学院学生综合服务与党团管理平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="student">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="./index.html">
        <span class="brand__mark">ISE</span>
        <span class="brand__text">学院综合服务平台</span>
      </a>
      <nav class="nav">
        <button class="nav__item is-active" data-target="home">首页</button>
        <button class="nav__item" data-target="knowledge">知识库</button>
        <button class="nav__item" data-target="process">党团进度</button>
        <button class="nav__item" data-target="notice">通知中心</button>
        <button class="nav__item" data-target="certificate">证明申请</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <div class="eyebrow">学生端</div>
          <h1>你好，2022级 软件工程 赵晨曦</h1>
        </div>
        <div class="topbar__actions">
          <span class="pill pill--success">实名已绑定</span>
          <a class="button" href="./admin.html">切换管理端</a>
        </div>
      </header>

      <section class="view is-visible" id="view-home">
        <div class="grid grid--metrics">
          <article class="metric-card">
            <span>待办事项</span>
            <strong id="todoCount">0</strong>
            <small>含审批进度与材料补交</small>
          </article>
          <article class="metric-card">
            <span>未读通知</span>
            <strong id="unreadCount">0</strong>
            <small>定向推送与公告提醒</small>
          </article>
          <article class="metric-card">
            <span>知识库命中</span>
            <strong>128</strong>
            <small>本周热门检索结果</small>
          </article>
        </div>

        <div class="grid grid--two">
          <section class="panel">
            <div class="section-head">
              <h2>快捷入口</h2>
            </div>
            <div class="shortcut-grid">
              <button class="shortcut" data-jump="knowledge">奖助政策查询</button>
              <button class="shortcut" data-jump="process">查看党团进度</button>
              <button class="shortcut" data-jump="certificate">申请在读证明</button>
              <button class="shortcut" data-jump="notice">查看定向通知</button>
            </div>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>当前进度</h2>
              <span class="pill">预备党员阶段</span>
            </div>
            <div class="progress-mini" id="progressMini"></div>
          </section>
        </div>

        <div class="grid grid--two">
          <section class="panel">
            <div class="section-head">
              <h2>近期通知</h2>
            </div>
            <div id="noticePreview" class="stack"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>我的画像</h2>
            </div>
            <div class="tag-group">
              <span class="tag">2022级</span>
              <span class="tag">软件工程</span>
              <span class="tag">党员发展对象</span>
              <span class="tag">奖学金关注</span>
              <span class="tag">就业意向</span>
            </div>
            <div class="info-list">
              <div><span>班级</span><strong>软件工程 2 班</strong></div>
              <div><span>辅导员</span><strong>李老师</strong></div>
              <div><span>培养状态</span><strong>正常在读</strong></div>
            </div>
          </section>
        </div>
      </section>

      <section class="view" id="view-knowledge">
        <section class="panel">
          <div class="section-head">
            <h2>政策知识库</h2>
            <div class="search-row">
              <input id="knowledgeSearch" class="input" type="search" placeholder="搜索奖学金、复学、党员发展、证明模板">
              <select id="knowledgeCategory" class="input input--select">
                <option value="all">全部分类</option>
                <option value="奖助">奖助</option>
                <option value="学籍">学籍</option>
                <option value="党团">党团</option>
                <option value="证明">证明</option>
              </select>
            </div>
          </div>
          <div id="knowledgeList" class="stack"></div>
        </section>
      </section>

      <section class="view" id="view-process">
        <section class="panel">
          <div class="section-head">
            <h2>党团事务进度</h2>
            <span class="pill pill--warn">当前节点：预备党员考察</span>
          </div>
          <div id="timeline" class="timeline timeline--flow"></div>
          <div class="callout">
            <strong>待补材料</strong>
            <p>请于 4 月 25 日前补交《季度思想汇报》与《志愿服务记录表》。</p>
          </div>
        </section>
      </section>

      <section class="view" id="view-notice">
        <section class="panel">
          <div class="section-head">
            <h2>通知中心</h2>
            <button id="markAllRead" class="button">全部标记为已读</button>
          </div>
          <div id="noticeList" class="stack"></div>
        </section>
      </section>

      <section class="view" id="view-certificate">
        <div class="grid grid--two">
          <section class="panel">
            <div class="section-head">
              <h2>发起证明申请</h2>
            </div>
            <form id="certificateForm" class="form">
              <label>
                <span>证明类型</span>
                <select name="type" class="input input--select">
                  <option value="在读证明">在读证明</option>
                  <option value="成绩证明">成绩证明</option>
                  <option value="党员材料证明">党员材料证明</option>
                </select>
              </label>
              <label>
                <span>用途说明</span>
                <input name="purpose" class="input" type="text" placeholder="如：实习单位提交材料">
              </label>
              <label>
                <span>补充说明</span>
                <textarea name="remark" class="input textarea" rows="4" placeholder="填写具体用途或收件要求"></textarea>
              </label>
              <button type="submit" class="button button--primary">提交申请</button>
            </form>
            <p id="certificateFeedback" class="feedback" hidden></p>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>我的申请记录</h2>
            </div>
            <div id="certificateList" class="stack"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="./scripts/app.js"></script>
</body>
</html>
